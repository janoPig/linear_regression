name: CI

on:
  push:
    branches: [ "main", "gtest" ]
  pull_request:
    branches: [ "main", "gtest" ]
  workflow_dispatch:

jobs:
  build-test:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        compiler: [ default ]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Dependencies (Windows)
      if: ${{ matrix.os == 'windows-latest' }}
      run: |
        choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --yes

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Build
      run: |
        cd build
        cmake --build .

    - name: Run Tests
      run: |
        cd build
        ./tests
