name: CI

on:
  push:
    branches: [ "main", "gtest" ]
  pull_request:
    branches: [ "main", "gtest" ]
  workflow_dispatch:

jobs:
  build-test:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        compiler: [ default ]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -S ../tests -B . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Run Tests
      run: |
        cd build
        ctest --verbose --output-on-failure -C Release
